<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>تأكيد تفعيل البريد الإلكتروني</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #0c2d57, #0a2547);
        font-family: "Tajawal", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #ffffff;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background-color: #ffffff;
        border-radius: 14px;
        padding: 40px 30px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      }

      .card__icon {
        width: 60px;
        height: 60px;
        margin: 0 auto 20px;
        border-radius: 50%;
        background-color: #e6f0ff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #004080;
        font-weight: bold;
      }

      .card__title {
        font-size: 22px;
        font-weight: 700;
        color: #0c2d57;
        margin-bottom: 15px;
      }

      .card__text {
        font-size: 15px;
        color: #555;
        line-height: 1.7;
        margin-bottom: 25px;
      }

      .divider {
        height: 1px;
        background-color: #e6e6e6;
        margin: 25px 0;
      }

      .card__branding {
        font-size: 14px;
        color: #888;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="card__icon">✓</div>

      <h1 class="card__title">تم تفعيل بريدك الإلكتروني بنجاح</h1>

      <p class="card__text">
        نشكرك على تأكيد بريدك الإلكتروني. يمكنك الآن الاستفادة الكاملة من جميع
        خدماتنا بكل سهولة وأمان.
      </p>

      <div class="divider"></div>

      <p class="card__branding">صحتك تهمنا</p>
    </div>
  </body>
</html>
